version: '3.8'

services:
  web:
    build: .
    container_name: devops-flask-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=local
      - APP_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
